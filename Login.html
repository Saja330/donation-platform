<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Donation Platform</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* تنسيقات عامة للصفحة */
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* ترويسة الصفحة */
    header {
      width: 100%;
    }

    nav {
      background-color: #34495e;
      overflow: hidden;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      align-items: center;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
      display: block;
    }

    nav a:hover {
      background-color: #2c3e50;
    }

    .nav-item {
      position: relative;
    }

    .dropbtn {
      cursor: pointer;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #34495e;
      min-width: 160px;
      top: 100%;
      left: 0;
      z-index: 1000;
    }

    .dropdown-content a {
      padding: 12px 16px;
      text-align: left;
    }

    .nav-item:hover .dropdown-content {
      display: block;
    }

    /* نموذج تسجيل الدخول */
    .login-container {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 300px;
      margin-top: 40px;
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #219150;
    }

    /* تذييل الصفحة */
    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: auto;
      width: 100%;
    }
  </style>
</head>

<body>

  <header>
    <nav>
      <div style="display: flex; align-items: center; padding: 10px 20px;">
        <img src="images/logo.jpg" alt="Logo" style="width: 40px; height: auto; margin-right: 20px;">
        <span style="color: white; font-size: 20px; font-weight: bold;">
          ATTAYAKUM Donation Platform
        </span>
      </div>

      <a href="index.html">Home</a>

      <div class="nav-item">
        <a href="#" class="dropbtn">Donations</a>
        <div class="dropdown-content">
          <a href="New_Donate.html">Add Donation</a>
          <a href="Donations.html">View Donations</a>
        </div>
      </div>

      <a href="Login.html">Login</a>
      <a href="signup.html">Register</a>
    </nav>
  </header>

  <div class="login-container">
    <h2>Login</h2>
    <form>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>
  </div>

  <footer>
    <p>&copy; 2025 Used Items Donation Platform</p>
  </footer>

</body>
</html>
