<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Used Items Donation Platform</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      margin: 0;

      text-align: center;
    }
    header {
      background-color: #2c3e50;
      color: white;

    }
    section {

  <header>
    <h1>Used Items Donation Platform</h1>

  </header>

  <section>

    <p style="text-align:center; margin-top:10px;">

    </p>

  </section>

</html>
