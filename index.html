<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Used Items Donation Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      background-color: #34495e;
      overflow: hidden;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }
    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
      display: block;
    }
    nav a:hover {
      background-color: #2c3e50;
    }
    section {
      padding: 40px;
      text-align: center;
    }
    .button {
      background-color: #27ae60;
      color: white;
      padding: 15px 25px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }
    .button:hover {
      background-color: #219150;
    }
    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 50px;
    }

  <header>

    <p>Give what you don't need. Help someone in need.</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="donations.html">Donations</a>
    <a href="login.html">Login</a>

  </nav>

  <section>
    <button class="button" onclick="location.href='login.html'">Login</button>

  <footer>
